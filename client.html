<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geology AI Agent</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:         #07080a;
      --surface:    #0d0f14;
      --surface2:   #12151c;
      --border:     #1c2030;
      --border2:    #252a38;
      --gold:       #c8973a;
      --gold-soft:  #a07228;
      --gold-glow:  rgba(200,151,58,.12);
      --teal:       #38b2a0;
      --teal-glow:  rgba(56,178,160,.08);
      --text:       #ddd8cc;
      --text-dim:   #9a9488;
      --text-muted: #52504a;
      --red:        #c05050;
      --radius:     6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── Layered background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 10% 20%, rgba(200,151,58,.04) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 90% 80%, rgba(56,178,160,.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 10;
      padding: 1.75rem 2.5rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      border-bottom: 1px solid var(--border);
      background: rgba(7,8,10,.8);
      backdrop-filter: blur(12px);
    }

    .logo-wrap {
      position: relative;
      width: 42px;
      height: 42px;
      flex-shrink: 0;
    }

    .logo-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid var(--gold-soft);
      opacity: 0.5;
      animation: spin-slow 20s linear infinite;
    }
    .logo-ring-inner {
      position: absolute;
      inset: 7px;
      border-radius: 50%;
      border: 1px solid rgba(200,151,58,.3);
      animation: spin-slow 12s linear infinite reverse;
    }
    @keyframes spin-slow {
      to { transform: rotate(360deg); }
    }
    .logo-core {
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--gold) 0%, var(--gold-soft) 100%);
      opacity: 0.85;
    }

    .header-meta {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.45rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--text);
      line-height: 1;
    }
    .header-title em {
      font-style: italic;
      color: var(--gold);
      font-weight: 400;
    }

    .header-sub {
      font-size: 0.58rem;
      color: var(--text-muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .model-tag {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      border: 1px solid var(--border2);
      padding: 0.3rem 0.7rem;
      border-radius: var(--radius);
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--teal);
    }
    .status-dot {
      width: 6px; height: 6px;
      background: var(--teal);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--teal);
      animation: breathe 2.5s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { opacity: 1; box-shadow: 0 0 6px var(--teal); }
      50%      { opacity: 0.5; box-shadow: 0 0 2px var(--teal); }
    }

    /* ── Main layout ── */
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      padding: 2.5rem 2rem 2rem;
      position: relative;
      z-index: 1;
      gap: 1.5rem;
    }

    /* ── Messages area ── */
    #messages {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      min-height: 320px;
    }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 5rem 1.5rem;
      text-align: center;
      opacity: 0;
      animation: fade-up 0.9s cubic-bezier(.22,1,.36,1) 0.2s forwards;
    }

    .empty-icon {
      position: relative;
      width: 72px;
      height: 72px;
    }
    .empty-icon::before {
      content: '';
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 1px solid rgba(200,151,58,.15);
      animation: spin-slow 15s linear infinite;
    }

    .empty-state h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 300;
      font-style: italic;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }

    .empty-state p {
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      line-height: 2;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      justify-content: center;
      max-width: 520px;
    }

    .suggestion-btn {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .suggestion-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold-glow);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .suggestion-btn:hover {
      border-color: var(--gold-soft);
      color: var(--gold);
    }
    .suggestion-btn:hover::before { opacity: 1; }

    /* ── Message animations ── */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      opacity: 0;
      animation: fade-up 0.4s cubic-bezier(.22,1,.36,1) forwards;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── User question ── */
    .msg-question {
      align-self: flex-end;
      max-width: 72%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-bottom-right-radius: 2px;
      border-radius: var(--radius);
      border-bottom-right-radius: 2px;
      color: var(--text);
      padding: 0.9rem 1.15rem;
      font-size: 0.78rem;
      line-height: 1.7;
      position: relative;
    }
    .msg-question::after {
      content: '';
      position: absolute;
      bottom: 0; right: -1px;
      width: 0; height: 0;
      border-left: 8px solid var(--border2);
      border-top: 8px solid transparent;
    }

    /* ── Agent answer ── */
    .msg-answer { align-self: flex-start; max-width: 88%; }

    .answer-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .source-badge {
      font-size: 0.55rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 500;
      padding: 0.22rem 0.6rem;
      border-radius: 3px;
    }
    .badge-agent     { background: var(--gold-glow);  color: var(--gold);  border: 1px solid rgba(200,151,58,.25); }
    .badge-wikipedia { background: var(--teal-glow);  color: var(--teal);  border: 1px solid rgba(56,178,160,.2); }
    .badge-fallback  { background: rgba(192,80,80,.08); color: var(--red); border: 1px solid rgba(192,80,80,.2); }

    .conf-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.57rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }
    .conf-track {
      width: 56px; height: 2px;
      background: var(--border2);
      border-radius: 2px;
      overflow: hidden;
    }
    .conf-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-soft), var(--gold));
      border-radius: 2px;
      transition: width 0.7s cubic-bezier(.22,1,.36,1);
    }

    .answer-body {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid var(--gold-soft);
      border-radius: var(--radius);
      border-top-left-radius: 2px;
      padding: 1.1rem 1.25rem;
      font-size: 0.78rem;
      line-height: 1.9;
      color: var(--text);
      position: relative;
      overflow: hidden;
    }
    .answer-body::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 1px;
      background: linear-gradient(90deg, var(--gold-soft), transparent);
      opacity: 0.4;
    }
    .answer-body.source-wikipedia {
      border-left-color: var(--teal);
    }
    .answer-body.source-wikipedia::before {
      background: linear-gradient(90deg, var(--teal), transparent);
    }
    .answer-body.source-fallback {
      border-left-color: var(--red);
    }

    .wiki-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.9rem;
      font-size: 0.62rem;
      color: var(--teal);
      text-decoration: none;
      letter-spacing: 0.08em;
      opacity: 0.75;
      transition: opacity 0.2s;
      text-transform: uppercase;
    }
    .wiki-link:hover { opacity: 1; }
    .wiki-link::before { content: '↗'; }

    /* ── Thinking ── */
    .thinking {
      display: flex;
      gap: 5px;
      padding: 1.1rem 1.25rem;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid var(--gold-soft);
      border-radius: var(--radius);
      width: fit-content;
    }
    .thinking span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--gold-soft);
      animation: think 1.4s ease-in-out infinite;
    }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes think {
      0%,80%,100% { opacity: 0.2; transform: scale(0.75); }
      40%          { opacity: 1;   transform: scale(1); }
    }

    /* ── Divider between sessions ── */
    .session-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      opacity: 0.35;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .session-divider::before,
    .session-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Input area ── */
    .input-area {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 0.75rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-area:focus-within {
      border-color: var(--gold-soft);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      padding: 0.3rem 0.5rem;
      resize: none;
      outline: none;
      line-height: 1.7;
      min-height: 38px;
      max-height: 160px;
    }
    textarea::placeholder { color: var(--text-muted); font-style: italic; }

    .input-actions {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
    }

    .char-count {
      font-size: 0.55rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      padding: 0.4rem 0;
      white-space: nowrap;
      opacity: 0.6;
      transition: color 0.2s;
    }
    .char-count.warn { color: var(--gold); opacity: 1; }
    .char-count.limit { color: var(--red); opacity: 1; }

    .hint-text {
      font-size: 0.55rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      padding: 0.4rem 0;
      white-space: nowrap;
      opacity: 0.6;
    }

    button#send {
      background: var(--gold);
      color: #0a0808;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.65rem 1.3rem;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }
    button#send:hover   { background: #d8a84a; box-shadow: 0 0 16px rgba(200,151,58,.25); }
    button#send:active  { transform: scale(0.96); }
    button#send:disabled{ background: var(--gold-soft); cursor: not-allowed; opacity: 0.5; }

    /* ── Error toast ── */
    #error-toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #200e0e;
      border: 1px solid rgba(192,80,80,.4);
      color: #e07070;
      font-size: 0.66rem;
      padding: 0.65rem 1.25rem;
      border-radius: var(--radius);
      letter-spacing: 0.05em;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 100;
    }
    #error-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 1.25rem;
      font-size: 0.57rem;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-top: 1px solid var(--border);
    }
    footer span { color: var(--text-muted); opacity: 0.5; margin: 0 0.75rem; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="42" height="42">
      <circle cx="100" cy="100" r="100" fill="#1a1a1a"/>
      <circle cx="100" cy="100" r="90" fill="none" stroke="#333" stroke-width="1"/>
      <text x="100" y="122" text-anchor="middle" font-size="90"
        font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif">🤙</text>
    </svg>
  </div>

  <div class="header-meta">
    <h1 class="header-title">Geology <em>AI</em> Agent</h1>
    <p class="header-sub">Earth Sciences</p>
  </div>
</header>

<!-- Main -->
<main class="container">

  <div id="messages">
      <div class="suggestions">
        <button class="suggestion-btn" onclick="fill('What is quartz?')">What is quartz?</button>
        <button class="suggestion-btn" onclick="fill('How do volcanoes form?')">How do volcanoes form?</button>
        <button class="suggestion-btn" onclick="fill('Explain plate tectonics')">Explain plate tectonics</button>
        <button class="suggestion-btn" onclick="fill('What causes earthquakes?')">What causes earthquakes?</button>
        <button class="suggestion-btn" onclick="fill('What is the Mohs scale?')">What is the Mohs scale?</button>
        <button class="suggestion-btn" onclick="fill('How old is the Earth?')">How old is the Earth?</button>
      </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <textarea
      id="question"
      placeholder="geology question…"
      rows="1"
      maxlength="500"
      onkeydown="handleKey(event)"
      oninput="autoResize(this); updateCharCount(this)"
    ></textarea>
    <div class="input-actions">
      <span class="char-count" id="char-count">0/500</span>
      <button id="send" onclick="askAgent()">→</button>
    </div>
  </div>

</main>

<footer>
  Geology AI Agent
</footer>
<div id="error-toast"></div>

<script>
  const API = 'http://localhost:8000';
  let msgCount = 0;

  function updateCharCount(el) {
    const count = el.value.length;
    const counter = document.getElementById('char-count');
    counter.textContent = `${count}/500`;
    counter.className = 'char-count' + (count >= 500 ? ' limit' : count >= 400 ? ' warn' : '');
  }

  function fill(text) {
    const el = document.getElementById('question');
    el.value = text;
    autoResize(el);
    el.focus();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      askAgent();
    }
  }

  function showError(msg) {
    const toast = document.getElementById('error-toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 4500);
  }

  async function askAgent() {
    const input = document.getElementById('question');
    const question = input.value.trim();
    if (!question) return;

    const sendBtn  = document.getElementById('send');
    const messages = document.getElementById('messages');

    // Remove empty state on first message
    const emptyState = document.getElementById('empty-state');
    if (emptyState) emptyState.remove();

    // Add session divider every 4 messages
    if (msgCount > 0 && msgCount % 4 === 0) {
      const div = document.createElement('div');
      div.className = 'session-divider';
      div.textContent = 'continued';
      messages.appendChild(div);
    }

    // Question bubble
    const qDiv = document.createElement('div');
    qDiv.className = 'msg';
    qDiv.innerHTML = `<div class="msg-question">${escapeHtml(question)}</div>`;
    messages.appendChild(qDiv);

    // Thinking indicator
    const thinkDiv = document.createElement('div');
    thinkDiv.className = 'msg';
    thinkDiv.innerHTML = `<div class="thinking"><span></span><span></span><span></span></div>`;
    messages.appendChild(thinkDiv);

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    msgCount++;
    scrollBottom();

    const TIMEOUT_MS = 10000;
    const MAX_RETRIES = 2;

    async function fetchWithTimeout(url, options) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), TIMEOUT_MS);
      try {
        const res = await fetch(url, { ...options, signal: controller.signal });
        return res;
      } finally {
        clearTimeout(timer);
      }
    }

    let lastErr;
    for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
      try {
        const res = await fetchWithTimeout(`${API}/ask`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }

        const data = await res.json();
        thinkDiv.remove();
        renderAnswer(data, messages);
        lastErr = null;
        break;

      } catch (err) {
        lastErr = err;
        if (err.name === 'AbortError') break; // timeout — لا تعيد المحاولة
        if (attempt < MAX_RETRIES) await new Promise(r => setTimeout(r, 1000));
      }
    }

    if (lastErr) {
      thinkDiv.remove();
      const msg = lastErr.name === 'AbortError'
        ? '⚠  Request timed out — server took too long to respond'
        : lastErr.message.includes('Failed to fetch')
          ? '⚠  Cannot reach API — is uvicorn running on :8000?'
          : `⚠  ${lastErr.message}`;
      showError(msg);
    }

    sendBtn.disabled = false;
    input.focus();
    scrollBottom();
  }

  function renderAnswer(data, container) {
    const confPct = Math.round((data.confident || 0) * 100);

    const badgeMap = {
      agent:     'badge-agent',
      wikipedia: 'badge-wikipedia',
      fallback:  'badge-fallback',
    };
    const labelMap = {
      agent:     'AI · Direct',
      wikipedia: 'Wikipedia',
      fallback:  'Fallback',
    };

    const safeUrl = data.wiki_url && data.wiki_url.startsWith('https://') ? data.wiki_url : null;
    const wikiLink = safeUrl
      ? `<a class="wiki-link" href="${safeUrl}" target="_blank" rel="noopener noreferrer">Read full article on Wikipedia</a>`
      : '';

    const div = document.createElement('div');
    div.className = 'msg msg-answer';
    div.innerHTML = `
      <div class="answer-header">
        <span class="source-badge ${badgeMap[data.source] || 'badge-fallback'}">
          ${labelMap[data.source] || data.source}
        </span>
        <div class="conf-wrap">
          <div class="conf-track">
            <div class="conf-fill" style="width:${confPct}%"></div>
          </div>
          <span>${confPct}% conf.</span>
        </div>
      </div>
      <div class="answer-body source-${data.source}">
        ${escapeHtml(data.answer)}
        ${wikiLink}
      </div>
    `;
    container.appendChild(div);
  }

  function escapeHtml(s) {
    return s
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function scrollBottom() {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }
</script>
</body>
</html>
